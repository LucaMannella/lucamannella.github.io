<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Large LM shield favicon">
  <defs>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10233f"/>
      <stop offset="100%" stop-color="#1c3f6e"/>
    </linearGradient>
  </defs>

  <!-- Main shield fills almost the whole icon -->
  <path d="M64 6
           C89 6 107 13 118 20
           V58
           C118 89 95 113 64 124
           C33 113 10 89 10 58
           V20
           C21 13 39 6 64 6 Z"
        fill="url(#shieldFill)"
        stroke="#ffffff"
        stroke-width="6"
        stroke-linejoin="round"/>

  <!-- Circuit accents sit close to the border -->
  <path d="M18 40 H34" stroke="#8fb8ff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="13" cy="40" r="4.5" fill="#8fb8ff"/>
  <path d="M22 28 H38" stroke="#8fb8ff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="17" cy="28" r="4.5" fill="#8fb8ff"/>

  <path d="M92 94 H108" stroke="#8fb8ff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="113" cy="94" r="4.5" fill="#8fb8ff"/>
  <path d="M88 106 H104" stroke="#8fb8ff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="109" cy="106" r="4.5" fill="#8fb8ff"/>

  <!-- Larger LM -->
  <text x="64" y="82"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="46"
        font-weight="700"
        letter-spacing="0.5"
        fill="#ffffff">LM</text>
</svg>
