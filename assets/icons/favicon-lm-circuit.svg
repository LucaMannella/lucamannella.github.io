<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Large LM circuit favicon">
  <defs>
    <linearGradient id="panelFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1f38"/>
      <stop offset="100%" stop-color="#214a7a"/>
    </linearGradient>
  </defs>

  <!-- Main panel fills almost the whole icon -->
  <rect x="6" y="6" width="116" height="116" rx="24"
        fill="url(#panelFill)"
        stroke="#ffffff"
        stroke-width="6"/>

  <!-- Circuit lines and nodes, pushed toward the edges -->
  <path d="M18 30 H42" stroke="#8fb8ff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="13" cy="30" r="4.5" fill="#8fb8ff"/>
  <path d="M18 50 H36" stroke="#8fb8ff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="13" cy="50" r="4.5" fill="#8fb8ff"/>

  <path d="M88 28 H110" stroke="#8fb8ff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="115" cy="28" r="4.5" fill="#8fb8ff"/>
  <path d="M94 46 H110" stroke="#8fb8ff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="115" cy="46" r="4.5" fill="#8fb8ff"/>

  <path d="M92 96 H110" stroke="#8fb8ff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="115" cy="96" r="4.5" fill="#8fb8ff"/>
  <path d="M18 98 H38" stroke="#8fb8ff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="13" cy="98" r="4.5" fill="#8fb8ff"/>

  <!-- Inner rails -->
  <path d="M44 20 V108" stroke="#355f95" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M84 20 V108" stroke="#355f95" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Larger LM -->
  <text x="64" y="82"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="46"
        font-weight="700"
        letter-spacing="0.5"
        fill="#ffffff">LM</text>
</svg>
